name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: pip install ruff pyflakes

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: pyflakes
        run: pyflakes reb_client tests
